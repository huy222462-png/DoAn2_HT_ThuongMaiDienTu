<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quen mat khau - LumiCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <span class="brand-mark me-2">LC</span>LumiCart
      </a>
    </div>
  </nav>

  <div class="container mt-5 mb-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg">
          <div class="card-header bg-primary text-white text-center py-3">
            <h3 class="mb-0"><i class="fas fa-key me-2"></i>Quen mat khau</h3>
          </div>
          <div class="card-body p-4">
            <div id="alertContainer"></div>

            <p class="text-muted">Nhap email da dang ky. He thong se gui link dat lai mat khau cho ban.</p>

            <form id="forgotPasswordForm">
              <div class="mb-3">
                <label for="loginMethod" class="form-label">
                  <i class="fas fa-user-tag me-1"></i>Tai khoan cua ban
                </label>
                <select class="form-select" id="loginMethod">
                  <option value="email" selected>Email</option>
                  <option value="phone">So dien thoai</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="identifier" class="form-label" id="identifierLabel">
                  <i class="fas fa-envelope me-1"></i>Email
                </label>
                <input type="text" class="form-control" id="identifier" placeholder="email@example.com" required>
                <small class="text-muted" id="forgotHintText">Link dat lai mat khau se duoc gui ve email cua tai khoan.</small>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
                <i class="fas fa-paper-plane me-2"></i>Gui link dat lai mat khau
              </button>
            </form>

            <div class="text-center mt-3">
              <a href="login.html" class="text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Quay lai dang nhap</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/forgot-password.js"></script>
</body>
</html>
