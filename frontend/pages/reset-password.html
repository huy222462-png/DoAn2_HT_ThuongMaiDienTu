<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dat lai mat khau - LumiCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <span class="brand-mark me-2">LC</span>LumiCart
      </a>
    </div>
  </nav>

  <div class="container mt-5 mb-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg">
          <div class="card-header bg-primary text-white text-center py-3">
            <h3 class="mb-0"><i class="fas fa-lock me-2"></i>Dat lai mat khau</h3>
          </div>
          <div class="card-body p-4">
            <div id="alertContainer"></div>

            <form id="resetPasswordForm">
              <div class="mb-3">
                <label for="newPassword" class="form-label">
                  <i class="fas fa-lock me-1"></i>Mat khau moi
                </label>
                <input type="password" class="form-control" id="newPassword" required minlength="6">
                <small class="text-muted">Mat khau toi thieu 6 ky tu.</small>
              </div>

              <div class="mb-3">
                <label for="confirmPassword" class="form-label">
                  <i class="fas fa-lock me-1"></i>Xac nhan mat khau moi
                </label>
                <input type="password" class="form-control" id="confirmPassword" required minlength="6">
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
                <i class="fas fa-check me-2"></i>Cap nhat mat khau
              </button>
            </form>

            <div class="text-center mt-3">
              <a href="login.html" class="text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Quay lai dang nhap</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/reset-password.js"></script>
</body>
</html>
